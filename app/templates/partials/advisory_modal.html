<dialog class="modal" id="advisory-modal" aria-labelledby="advisory-modal-title">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="advisory-modal-title">Add Advisory</h2>
      <button type="button" class="icon-button" data-close-modal aria-label="Close"><i data-lucide="x"></i></button>
    </div>
    <form method="post" action="/ui/advisories" class="modal-form">
      <div class="form-grid">
        <label>
          Patient ID
          <input name="patient_id" value="{{ form.patient_id if form else generated_patient_id }}" readonly required>
        </label>
        <label>
          Clinician Name
          <input name="clinician_name" value="{{ form.clinician_name if form else '' }}" required>
        </label>
        <label class="full">
          Instruction
          <textarea name="instruction" rows="4" required>{{ form.instruction if form else '' }}</textarea>
        </label>
        <label>
          Schedule Type
          <select name="schedule_type">
            <option value="daily" {% if form and form.schedule_type == "daily" %}selected{% endif %}>Daily</option>
            <option value="weekly" {% if form and form.schedule_type == "weekly" %}selected{% endif %}>Weekly</option>
          </select>
        </label>
        <label>
          Time
          <input name="time" type="time" value="{{ form.time if form else '08:00' }}" required>
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="button-ghost" data-close-modal>Cancel</button>
        <button type="submit"><i data-lucide="send"></i><span>Publish Advisory</span></button>
      </div>
    </form>
  </div>
</dialog>
