<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#155e75">
    <meta name="description" content="{{ meta_description|default('CareFlow clinical workflow system.') }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page_title|default('CareFlow') }}">
    <meta property="og:description" content="{{ meta_description|default('CareFlow clinical workflow system.') }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:image" content="{{ request.url_for('static', path='logo.svg') }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page_title|default('CareFlow') }}">
    <meta name="twitter:description" content="{{ meta_description|default('CareFlow clinical workflow system.') }}">
    <title>{% block title %}{{ page_title|default('CareFlow') }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/logo.svg">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-open-modal="{{ open_modal|default('') }}">
    {% set current_path = request.url.path %}
    <header class="topbar">
      <a class="brand" href="/" aria-label="CareFlow">
        <img src="/static/logo.svg" alt="" width="28" height="28">
        <span>CareFlow</span>
      </a>
      <nav aria-label="Primary">
        <a href="/" class="{{ 'active' if current_path == '/' else '' }}" {% if current_path == '/' %}aria-current="page"{% endif %}><i data-lucide="clipboard-plus"></i><span>Publish Advisory</span></a>
        <a href="/ui/advisories" class="{{ 'active' if current_path.startswith('/ui/advisories') else '' }}" {% if current_path.startswith('/ui/advisories') %}aria-current="page"{% endif %}><i data-lucide="file-text"></i><span>Advisories</span></a>
        <a href="/ui/schedule" class="{{ 'active' if current_path.startswith('/ui/schedule') else '' }}" {% if current_path.startswith('/ui/schedule') %}aria-current="page"{% endif %}><i data-lucide="calendar-clock"></i><span>Schedules</span></a>
        <a href="/ui/responses" class="{{ 'active' if current_path.startswith('/ui/responses') else '' }}" {% if current_path.startswith('/ui/responses') %}aria-current="page"{% endif %}><i data-lucide="activity"></i><span>Responses</span></a>
        <a href="/ui/alerts" class="{{ 'active' if current_path.startswith('/ui/alerts') else '' }}" {% if current_path.startswith('/ui/alerts') %}aria-current="page"{% endif %}><i data-lucide="triangle-alert"></i><span>Alerts</span></a>
        <a href="/docs"><i data-lucide="book-open"></i><span>API Docs</span></a>
      </nav>
    </header>

    <main class="page animate__animated animate__fadeIn">
      {% block content %}{% endblock %}
    </main>
    <div class="toast-region" aria-live="polite" aria-atomic="true">
      {% if toast_message %}
      <div class="toast {{ toast_type|default('success') }}" role="status">
        <i data-lucide="{{ 'circle-alert' if toast_type == 'error' else 'circle-check' }}"></i>
        <span>{{ toast_message }}</span>
        <button class="toast-close" type="button" aria-label="Dismiss"><i data-lucide="x"></i></button>
      </div>
      {% endif %}
    </div>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      function refreshIcons() {
        if (window.lucide) {
          window.lucide.createIcons({ attrs: { "aria-hidden": "true" } });
        }
      }

      refreshIcons();

      document.querySelectorAll("[data-open-modal]").forEach(function (button) {
        button.addEventListener("click", function () {
          var modal = document.getElementById(button.dataset.openModal);
          if (!modal) return;
          if (typeof modal.showModal === "function") {
            modal.showModal();
          } else {
            modal.setAttribute("open", "");
          }
          refreshIcons();
        });
      });

      document.querySelectorAll("[data-close-modal]").forEach(function (button) {
        button.addEventListener("click", function () {
          var modal = button.closest("dialog");
          if (modal) modal.close();
        });
      });

      document.querySelectorAll("dialog.modal").forEach(function (modal) {
        modal.addEventListener("click", function (event) {
          if (event.target === modal) modal.close();
        });
      });

      var initialModal = document.body.dataset.openModal;
      if (initialModal) {
        var modal = document.getElementById(initialModal);
        if (modal && typeof modal.showModal === "function") {
          modal.showModal();
        } else if (modal) {
          modal.setAttribute("open", "");
        }
      }

      document.querySelectorAll(".toast").forEach(function (toast) {
        var close = toast.querySelector(".toast-close");
        var dismiss = function () {
          toast.classList.add("is-hiding");
          window.setTimeout(function () { toast.remove(); }, 180);
        };
        if (close) close.addEventListener("click", dismiss);
        window.setTimeout(dismiss, 4200);
      });

      if (window.history && window.location.search.indexOf("toast=") !== -1) {
        var url = new URL(window.location.href);
        url.searchParams.delete("toast");
        window.history.replaceState({}, "", url);
      }
    </script>
  </body>
</html>
