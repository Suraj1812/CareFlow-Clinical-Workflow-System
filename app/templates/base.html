<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CareFlow{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/"><i data-lucide="cross"></i><span>CareFlow</span></a>
      <nav aria-label="Primary">
        <a href="/"><i data-lucide="clipboard-plus"></i><span>Publish Advisory</span></a>
        <a href="/ui/advisories"><i data-lucide="file-text"></i><span>Advisories</span></a>
        <a href="/ui/schedule"><i data-lucide="calendar-clock"></i><span>Schedules</span></a>
        <a href="/ui/responses"><i data-lucide="activity"></i><span>Responses</span></a>
        <a href="/ui/alerts"><i data-lucide="triangle-alert"></i><span>Alerts</span></a>
        <a href="/docs"><i data-lucide="book-open"></i><span>API Docs</span></a>
      </nav>
    </header>

    <main class="page animate__animated animate__fadeIn">
      {% block content %}{% endblock %}
    </main>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      if (window.lucide) {
        window.lucide.createIcons({ attrs: { "aria-hidden": "true" } });
      }
    </script>
  </body>
</html>
