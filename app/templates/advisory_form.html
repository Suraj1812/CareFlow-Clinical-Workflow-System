{% extends "base.html" %}
{% block title %}Publish Advisory - CareFlow{% endblock %}
{% block content %}
<section class="section">
  <div class="section-header">
    <h1>Publish Advisory</h1>
  </div>

  {% if error %}
  <p class="notice error">{{ error }}</p>
  {% endif %}

  <form method="post" action="/ui/advisories" class="form-grid">
    <label>
      Patient ID
      <input name="patient_id" value="{{ form.patient_id if form else '' }}" required>
    </label>
    <label>
      Clinician Name
      <input name="clinician_name" value="{{ form.clinician_name if form else '' }}" required>
    </label>
    <label class="full">
      Instruction
      <textarea name="instruction" rows="4" required>{{ form.instruction if form else '' }}</textarea>
    </label>
    <label>
      Schedule Type
      <select name="schedule_type">
        <option value="daily" {% if form and form.schedule_type == "daily" %}selected{% endif %}>Daily</option>
        <option value="weekly" {% if form and form.schedule_type == "weekly" %}selected{% endif %}>Weekly</option>
      </select>
    </label>
    <label>
      Time
      <input name="time" type="time" value="{{ form.time if form else '08:00' }}" required>
    </label>
    <div class="form-actions full">
      <button type="submit"><i data-lucide="send"></i><span>Publish Advisory</span></button>
    </div>
  </form>
</section>

<section class="section">
  <div class="section-header">
    <h2>Recent Advisories</h2>
  </div>
  {% include "partials/advisory_table.html" %}
</section>
{% endblock %}
